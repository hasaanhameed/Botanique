version: '3.8'

services:
  backend:
    build:
      context: ./botanique_backend
      dockerfile: Dockerfile
    container_name: botanique_backend
    ports:
      - "8000:8000"
    env_file:
      - ./botanique_backend/.env
    restart: always

  redis:
    image: redis:alpine
    container_name: botanique_redis
    ports:
      - "6379:6379"
    restart: always
